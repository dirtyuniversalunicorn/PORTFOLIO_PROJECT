name: ci:check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: CI check
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/portfolio_ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify lockfile
        run: test -f package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run CI
        run: npm run ci:check
